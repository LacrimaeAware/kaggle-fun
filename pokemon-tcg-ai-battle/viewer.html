const DECKS = [{"id":"D001","name":"Mega Abomasnow ex (official sample)","source":"official sample","cards":[1158,721,721,722,722,722,722,723,723,723,723,1145,1145,1145,1145,1205,1205,1227,1227,1227,1227,1235,1235,1235,1235,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3],"notes":""},{"id":"D002","name":"Koraidon ex deck","source":"crustle notebook","cards":[345,345,345,345,344,344,344,344,979,117,378,112,112,1182,1182,1182,1182,1227,1227,1227,1219,1219,1219,1219,1198,1198,1198,1198,1197,1225,1122,1122,1122,1122,1152,1152,1086,1086,1121,1121,1097,1097,1147,1147,1174,1159,1168,1175,11,11,11,1,1,1,1,7,7,7,6,6],"notes":""},{"id":"D003","name":"Mega Lucario ex deck","source":"validated-matchup notebook","cards":[673,673,674,674,675,675,676,676,676,677,677,677,678,678,678,678,1102,1102,1102,1102,1123,1123,1141,1141,1141,1141,1142,1142,1142,1142,1152,1152,1152,1152,1159,1182,1182,1192,1192,1192,1192,1227,1227,1227,1227,1252,1252,6,6,6,6,6,6,6,6,6,6,6,6,6],"notes":""},{"id":"D004","name":"Mega Abomasnow ex deck","source":"RL+MCTS sample","cards":[721,721,722,722,722,722,723,723,723,723,1092,1121,1121,1145,1145,1163,1163,1219,1219,1219,1219,1227,1227,1227,1227,1262,1262,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3],"notes":""},{"id":"D005","name":"Mega Abomasnow ex deck","source":"beginner notebook","cards":[722,722,722,722,723,723,723,723,721,721,1064,1064,1145,1145,1145,1145,1086,1086,1086,1086,1097,1097,1079,1079,1205,1205,1205,1205,1227,1227,1227,1227,1235,1235,1235,1235,1182,1182,1212,1212,1158,1157,1157,1175,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3],"notes":""}];
const REPLAYS = [{"id":"a1f40cd4-6a3a-11f1-9e7c-0242ac130204","file":"80300466.json","date":"","steps":41,"winner":0,"self_play":true,"deck0":[721,721,722,722,722,722,723,723,723,723,1092,1121,1121,1145,1145,1163,1163,1219,1219,1219,1219,1227,1227,1227,1227,1262,1262,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3],"deck1":[721,721,722,722,722,722,723,723,723,723,1092,1121,1121,1145,1145,1163,1163,1219,1219,1219,1219,1227,1227,1227,1227,1262,1262,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3,3],"played0":{"1227":2,"1092":1,"1262":1,"1145":3,"721":1,"1219":2},"played1":{"1227":2,"1092":1,"1262":1,"1145":2,"721":1,"1219":1}}];
const IMG = "data/external/official/card_images";
const ECOL = {G:'--G',R:'--R',W:'--W',L:'--L',P:'--P',F:'--F',D:'--D',M:'--M',N:'--N',C:'--C'};
function ecolor(l){return getComputedStyle(document.documentElement).getPropertyValue(ECOL[l]||'--C')||'#ccc'}
function energies(s){return (s.match(/\{(.)\}/g)||[]).map(x=>x[1])}
function dots(s){return energies(s).map(l=>`<span class="dot" style="background:${ecolor(l)}"></span>`).join('')}
function imgTag(id,cls){const c=CARDS[id]; return c&&c.img?`<img loading="lazy" src="${IMG}/${id}.jpg" alt="">`:`<div class="ph">${c?c.n:id}</div>`}
function isMega(c){return /mega/i.test(c.n)&&/ex/i.test(c.n)} function isEx(c){return /\bex\b/i.test(c.n)}
function catOf(c){const s=(c.cat||'')+(c.st||''); if(/energy/i.test(s))return 'Energy'; if(/pok/i.test(s)||c.hp&&/\d/.test(c.hp))return 'Pokemon'; return 'Trainer'}

let view='cards', q='', filt={cat:'',ty:'',ex:false}, deck=DECKS[0]&&DECKS[0].id;
const main=document.getElementById('main'), dnav=document.getElementById('decknav');
document.getElementById('nc').textContent=Object.keys(CARDS).length;
document.getElementById('nd').textContent=DECKS.length;
document.getElementById('nr').textContent=REPLAYS.length;

document.querySelectorAll('nav .navlink[data-v]').forEach(el=>el.onclick=()=>{
  view=el.dataset.v; document.querySelectorAll('nav .navlink').forEach(n=>n.classList.toggle('on',n===el));
  render();
});
function setView(v){view=v;document.querySelectorAll('nav .navlink[data-v]').forEach(n=>n.classList.toggle('on',n.dataset.v===v));render();}

function render(){ dnav.innerHTML=''; if(view==='cards')renderCards(); else if(view==='decks')renderDecks();
  else if(view==='stats')renderStats(); else renderReplays(); }

/* ---- cards ---- */
function cardMatch(id){const c=CARDS[id]; if(!c)return false;
  if(filt.cat&&catOf(c)!==filt.cat)return false;
  if(filt.ex&&!isEx(c))return false;
  if(filt.ty&&!energies(c.ty).includes(filt.ty)&&!(c.ty||'').includes(filt.ty))return false;
  if(q){const t=(c.n+' '+c.a.map(a=>a.n+' '+a.e).join(' ')).toLowerCase(); if(!t.includes(q))return false;}
  return true;}
function renderCards(){
  const types=['G','R','W','L','P','F','D','M','N','C'];
  main.innerHTML=`<h1>Cards</h1><div class="muted">${Object.keys(CARDS).length} cards in the cabt pool. Click a card for details.</div>
  <div class="bar"><input type="search" id="q" placeholder="search name or attack text" value="${q}">
  ${['Pokemon','Trainer','Energy'].map(c=>`<span class="chip ${filt.cat===c?'on':''}" data-cat="${c}">${c}</span>`).join('')}
  <span class="chip ${filt.ex?'on':''}" data-ex>ex / Mega</span>
  ${types.map(t=>`<span class="chip ${filt.ty===t?'on':''}" data-ty="${t}" title="${t}"><span class="dot" style="background:${ecolor(t)}"></span></span>`).join('')}
  </div><div class="grid" id="grid"></div>`;
  const ids=Object.keys(CARDS).map(Number).filter(cardMatch).slice(0,1400);
  document.getElementById('grid').innerHTML=ids.map(id=>{const c=CARDS[id];
    return `<div class="card" onclick="showCard(${id})">${imgTag(id)}<div class="cap"><b>${c.n}</b><span class="muted">${c.hp&&/\d/.test(c.hp)?c.hp+' HP':catOf(c)}</span></div></div>`}).join('')
    ||'<div class="muted">no matches</div>';
  document.getElementById('q').oninput=e=>{q=e.target.value.toLowerCase();renderCards();document.getElementById('q').focus();};
  main.querySelectorAll('[data-cat]').forEach(el=>el.onclick=()=>{filt.cat=filt.cat===el.dataset.cat?'':el.dataset.cat;renderCards()});
  main.querySelectorAll('[data-ty]').forEach(el=>el.onclick=()=>{filt.ty=filt.ty===el.dataset.ty?'':el.dataset.ty;renderCards()});
  main.querySelector('[data-ex]').onclick=()=>{filt.ex=!filt.ex;renderCards()};
}
function showCard(id){const c=CARDS[id]; const tag=isMega(c)?'<span class="pill mega">Mega ex - 3 prizes</span>':isEx(c)?'<span class="pill ex">ex - 2 prizes</span>':'';
  document.getElementById('detailbody').innerHTML=`${imgTag(id)}<h2>${c.n}</h2><div class="muted">${catOf(c)} ${c.st?'- '+c.st:''} ${c.exp?'- '+c.exp:''}</div>${tag}
  <div class="kv">${c.hp&&/\d/.test(c.hp)?`<span>HP ${c.hp}</span>`:''}${c.ty?`<span>${dots(c.ty)||c.ty} type</span>`:''}
  ${c.wk&&c.wk!=='n/a'?`<span>weak ${c.wk}</span>`:''}${c.rs&&c.rs!=='n/a'?`<span>resist ${c.rs}</span>`:''}
  ${c.rt&&/\d/.test(c.rt)?`<span>retreat ${c.rt}</span>`:''}${c.ev?`<span>from ${c.ev}</span>`:''}</div>
  ${c.a.map(a=>`<div class="atk"><span class="dmg">${a.d||''}</span><span class="nm"><span class="cost">${dots(a.c)}</span>${a.n}</span>${a.e?`<div class="ef">${a.e}</div>`:''}</div>`).join('')}
  <div class="atk muted" style="font-size:.78rem">card id ${id}</div>`;
  document.getElementById('detail').classList.add('open');}
function closeDetail(){document.getElementById('detail').classList.remove('open')}

/* ---- decks ---- */
function deckStats(ids){const cnt={Pokemon:0,Trainer:0,Energy:0},ty={}; let ex=0;
  ids.forEach(id=>{const c=CARDS[id]; if(!c)return; cnt[catOf(c)]++; if(isMega(c))ex+=3; else if(isEx(c))ex+=2;
    energies(c.ty).forEach(l=>ty[l]=(ty[l]||0)+1);}); return {cnt,ty,ex};}
function renderDecks(){
  dnav.innerHTML=DECKS.map(d=>`<div class="navlink ${d.id===deck?'on':''}" onclick="deck='${d.id}';render()">${d.name}</div>`).join('');
  const d=DECKS.find(x=>x.id===deck)||DECKS[0]; if(!d){main.innerHTML='<h1>Decks</h1><div class="muted">No decks yet. Build with tools/build_decks.py.</div>';return;}
  const ids=d.cards, c=new Map(); ids.forEach(i=>c.set(i,(c.get(i)||0)+1));
  const s=deckStats(ids);
  const groups={Pokemon:[],Trainer:[],Energy:[]}; [...c.keys()].forEach(i=>{const cc=CARDS[i]; if(cc)groups[catOf(cc)].push(i)});
  const tybadges=Object.entries(s.ty).sort((a,b)=>b[1]-a[1]).map(([l,n])=>`<span class="dot" style="background:${ecolor(l)}"></span>${n}`).join(' &nbsp;');
  main.innerHTML=`<div class="deckhead"><h1>${d.name}</h1><span class="pill">${d.source}</span></div>
  <div class="muted">${d.notes||'60-card deck. Names are auto-assigned; rename in registry/decks.json.'}</div>
  <div class="statrow"><div class="stat"><b>${s.cnt.Pokemon}</b><small>Pokemon</small></div><div class="stat"><b>${s.cnt.Trainer}</b><small>Trainer</small></div>
  <div class="stat"><b>${s.cnt.Energy}</b><small>Energy</small></div><div class="stat"><b>${s.ex}</b><small>prizes given on KO</small></div>
  <div class="stat" style="min-width:160px"><b style="font-size:.95rem">${tybadges||'-'}</b><small>energy types</small></div></div>
  <button class="btn" onclick="exportDeck('${d.id}')">Export deck.csv</button>
  ${['Pokemon','Trainer','Energy'].map(g=>groups[g].length?`<div class="sec">${g} (${s.cnt[g]})</div>
    <div class="grid">${groups[g].sort((a,b)=>c.get(b)-c.get(a)).map(i=>`<div class="card" onclick="showCard(${i})"><span class="cnt">${c.get(i)}x</span>${imgTag(i)}<div class="cap"><b>${CARDS[i]?CARDS[i].n:i}</b></div></div>`).join('')}</div>`:'').join('')}`;
}
function exportDeck(id){const d=DECKS.find(x=>x.id===id); const blob=new Blob([d.cards.join('\n')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=d.name.replace(/[^a-z0-9]+/gi,'_')+'_deck.csv'; a.click();}

/* ---- stats ---- */
function deckLabel(ids){ if(!ids||!ids.length)return '?'; let best=null;
  ids.forEach(id=>{const c=CARDS[id]; if(!c||!/\d/.test(c.hp||''))return; const hp=+c.hp||0; const k=(/ex/i.test(c.n)?1e4:0)+hp; if(!best||k>best[0])best=[k,c.n]}); return best?best[1]:'deck';}
function renderStats(){
  const real=REPLAYS.filter(r=>!r.self_play).length;
  const play={};
  REPLAYS.forEach(r=>{[r.played0,r.played1].forEach(p=>Object.entries(p||{}).forEach(([id,n])=>play[id]=(play[id]||0)+n))});
  const top=Object.entries(play).sort((a,b)=>b[1]-a[1]).slice(0,40);
  main.innerHTML=`<h1>Stats</h1><div class="muted">Aggregated from parsed replays in data/external/replays/.</div>
  <div class="note">${REPLAYS.length} replay(s) parsed, ${real} real opponent match(es). Stats are thin until real ranked-match replays are downloaded. Drop more replays into data/external/replays/ and run tools/build_stats.py then tools/build_viewer.py.</div>
  <div class="statrow"><div class="stat"><b>${REPLAYS.length}</b><small>replays</small></div><div class="stat"><b>${real}</b><small>real matches</small></div>
  <div class="stat"><b>${Object.keys(play).length}</b><small>distinct cards played</small></div></div>
  <div class="sec">Most-played cards (across replays)</div>
  <table><tr><th>card</th><th>type</th><th>times played</th></tr>
  ${top.map(([id,n])=>`<tr><td><a onclick="showCard(${id})">${CARDS[id]?CARDS[id].n:id}</a></td><td>${CARDS[id]?catOf(CARDS[id]):''}</td><td>${n}</td></tr>`).join('')||'<tr><td colspan=3 class="muted">none yet</td></tr>'}</table>`;
}
/* ---- replays ---- */
function renderReplays(){
  main.innerHTML=`<h1>Replays</h1><div class="muted">Parsed cabt episodes. Self-play = your validation games; real matches show the opponent's deck.</div>
  <table><tr><th>id</th><th>player 0 deck</th><th>player 1 deck</th><th>result</th><th>steps</th><th>type</th></tr>
  ${REPLAYS.map(r=>`<tr><td>${(r.id||'').slice(0,10)}</td><td>${deckLabel(r.deck0)}</td><td>${deckLabel(r.deck1)}</td>
    <td>${r.winner===null?'draw':'<span class="'+(r.winner===0?'win':'loss')+'">P'+r.winner+' won</span>'}</td>
    <td>${r.steps}</td><td>${r.self_play?'<span class="muted">self-play</span>':'real'}</td></tr>`).join('')
    ||'<tr><td colspan=6 class="muted">no replays yet</td></tr>'}</table>`;
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
render();
</script></body></html>
